
include:
  - local: '.gitlab-ci.oci-repository.yml'
  - component: $CI_SERVER_FQDN/library/cicd/auto-gitlab/auto-release@main

variables:
  CI_DEBUG_TRACE: "false"
  EXAMPLE_ENV_SRC: "gitlab-registry.fizn.ru/library/docker-images/local-tests/helm-install"
  EXAMPLE_ENV_DEST: "gitlab-registry.fizn.ru/library/cicd/templates/mirroring/oci-repository"

stages:
  - test
  - auto-gitlab

.auto-gitlab:auto-release:public:RELEASE-md:
  - |-
    cat > RELEASE.md <<EOF
    # Release ${CI_COMMIT_TAG}
    
    ## oci-repository
      * Шаблон `oci-repository` для зеркалирования OCI/Docker образов через `skopeo`
      * Поддержка синхронизации тегов между source и destination registry
      * Автоматическое удаление тегов в destination, отсутствующих в source
      * Поддержка кастомных auth-файлов Docker
      * Конфигурируемые параметры через `spec.inputs` 
    
    ### Артефакты
    * `reports/skopeo-copy.log`
    * `reports/skopeo-delete.log`
    
    ### Зависимости
    * skopeo (latest image по умолчанию: `quay.io/containers/skopeo:latest`)
    EOF
